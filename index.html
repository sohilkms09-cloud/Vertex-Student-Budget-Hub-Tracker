<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vertex Student Budget Hub Tracker</title>

    <link rel="stylesheet" href="login.css">

    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script type="module" src="login.js"></script>
</head>

<body>

    <!-- Floating Background Icons -->
    <div class="floating-icons">
        <i class="fas fa-wallet icon icon1"></i>
        <i class="fas fa-chart-line icon icon2"></i>
        <i class="fas fa-graduation-cap icon icon3"></i>
        <i class="fas fa-piggy-bank icon icon4"></i>
        <i class="fas fa-receipt icon icon5"></i>
        <i class="fas fa-chart-pie icon icon6"></i>
    </div>

    <div class="container">

        <div class="login-box">

            <img src="favicon.png" alt="Vertex Logo" class="logo">

            <h1>Vertex Student Budget Hub</h1>

            <div class="tracker-text">
                TRACKER
            </div>

            <div class="tagline">
                Track • Manage • Save • Grow
            </div>

            <p>
                Login with Google to access your dashboard
            </p>

            <button id="googleLogin">
                <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google">
                Sign in with Google
            </button>

        </div>

    </div>

</body>
</html>
