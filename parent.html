<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vertex Budget Hub - Parent Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* =========================================================================
           ✨ VERTEX PREMIUM PARENT HEADER GLASS SYSTEM
           ========================================================================= */
        .parent-header-premium {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.07) 0%, rgba(139, 92, 246, 0.03) 100%);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 20px;
            margin-bottom: 35px;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 0 20px rgba(56, 189, 248, 0.05);
            overflow: hidden;
        }

        .parent-header-premium::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 100px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 75%);
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            pointer-events: none;
        }

        .parent-title-main {
            font-size: 2.6rem;
            font-weight: 800;
            margin: 0 0 6px 0;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #ffffff 20%, #38bdf8 70%, #0284c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(56, 189, 248, 0.15));
        }

        .parent-mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.25);
            color: #38bdf8;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(56, 189, 248, 0.1);
        }

        .student-identity-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 16px;
            border-radius: 12px;
            margin-top: 5px;
        }

        .student-identity-badge p {
            margin: 0;
            font-size: 13.5px;
            color: var(--text-muted);
        }

        .student-name-highlight {
            color: #ffffff;
            font-weight: 700;
            position: relative;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-bottom: 1px;
            border-bottom: 1px dashed rgba(56, 189, 248, 0.4);
            margin-left: 5px;
        }

        .statement-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 10px;
        }
    </style>
</head>
<body class="dark-theme">

    <div class="glass-container" style="max-width: 800px;">
        
        <div class="parent-header-premium">
            <div class="parent-mode-badge">👨‍👩‍👦 Parent View Portal</div>
            <h1 class="parent-title-main">Vertex Budget Hub</h1>
            <div class="student-identity-badge">
                <p>Official Read-Only Financial Statement Overview for <span id="parent-student-name" class="student-name-highlight">STUDENT 🎓</span></p>
            </div>
        </div>

        <div class="glass-card" style="border-top: 4px solid #38bdf8;">
            <h2>👛 Active Wallet Account Balances</h2>
            <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 0;">
                <div class="wallet-sub-capsule" style="border-left: 4px solid #38bdf8;">
                    <span class="sub-card-label">📱 GPay Balance</span>
                    <h4 id="parent-gpay-display">₹0.00</h4>
                </div>
                <div class="wallet-sub-capsule" style="border-left: 4px solid #f59e0b;">
                    <span class="sub-card-label">💵 In-Hand Cash</span>
                    <h4 id="parent-cash-display">₹0.00</h4>
                </div>
            </div>
        </div>

        <div class="glass-card" style="border-top: 4px solid var(--accent);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h2>Complete Transaction & Activity History</h2>
                <span style="font-size: 12px; color: var(--text-muted);">Real-Time Sync</span>
            </div>
            <ul id="parent-global-history-list" class="ledger-scroller-view" style="max-height: 600px; gap: 10px;"></ul>
        </div>

    </div>

    <div id="receipt-lightbox" class="lightbox-overlay" style="display: none;">
        <div class="lightbox-content-box">
            <span id="close-lightbox-btn" class="lightbox-close-cross">×</span>
            <h3>📄 Attached Bill Document Preview</h3>
            <div class="lightbox-image-viewport">
                <img id="lightbox-render-target" src="" alt="Attached document view">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedName = sessionStorage.getItem('userDisplayName') || localStorage.getItem('userDisplayName');
            if (savedName && document.getElementById('parent-student-name')) {
                document.getElementById('parent-student-name').innerText = savedName.split(' ')[0].toUpperCase() + " 🎓";
            }

            const gpayInitial = parseFloat(localStorage.getItem('gpayWalletInitial')) || 0;
            const cashInitial = parseFloat(localStorage.getItem('cashWalletInitial')) || 0;
            const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            const subscriptions = JSON.parse(localStorage.getItem('subscriptions')) || [];
            const loggedIncomes = JSON.parse(localStorage.getItem('loggedIncomes')) || [];
            const internalTransfers = JSON.parse(localStorage.getItem('internalTransfers')) || [];
            const currentCurrency = localStorage.getItem('currency') || '₹';

            const lightbox = document.getElementById('receipt-lightbox');
            const target = document.getElementById('lightbox-render-target');
            
            window.openReceiptLightbox = function(url) {
                if (target && lightbox) {
                    target.src = url;
                    lightbox.style.display = 'flex';
                }
            };
            
            if (document.getElementById('close-lightbox-btn')) {
                document.getElementById('close-lightbox-btn').addEventListener('click', () => { lightbox.style.display = 'none'; });
            }
            lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.style.display = 'none'; });

            let gpayExpenses = expenses.filter(e => e.paymentMethod === 'GPay' || !e.paymentMethod).reduce((sum, e) => sum + (parseFloat(e.personalShare) || parseFloat(e.amount) || 0), 0);
            let cashExpenses = expenses.filter(e => e.paymentMethod === 'Cash').reduce((sum, e) => sum + (parseFloat(e.personalShare) || parseFloat(e.amount) || 0), 0);
            
            const totalGPaySubs = subscriptions.filter(s => s.paymentMethod === 'GPay' || !s.paymentMethod).reduce((sum, s) => sum + (parseFloat(s.amount) || 0), 0);
            const totalCashSubs = subscriptions.filter(s => s.paymentMethod === 'Cash').reduce((sum, s) => sum + (parseFloat(s.amount) || 0), 0);
            
            gpayExpenses += totalGPaySubs;
            cashExpenses += totalCashSubs;

            const gpayIncome = loggedIncomes.filter(i => i.paymentMethod === 'GPay' || !i.paymentMethod).reduce((sum, i) => sum + i.amount, 0);
            const cashIncome = loggedIncomes.filter(i => i.paymentMethod === 'Cash').reduce((sum, i) => sum + i.amount, 0);

            const transfersToCash = internalTransfers.filter(t => t.directionType === 'GPayToCash').reduce((sum, t) => sum + t.amountValue, 0);
            const transfersToGPay = internalTransfers.filter(t => t.directionType === 'CashToGPay').reduce((sum, t) => sum + t.amountValue, 0);

            const finalGPay = gpayInitial + gpayIncome - gpayExpenses - transfersToCash + transfersToGPay;
            const finalCash = cashInitial + cashIncome - cashExpenses + transfersToCash - transfersToGPay;

            document.getElementById('parent-gpay-display').innerText = currentCurrency + finalGPay.toFixed(2);
            document.getElementById('parent-cash-display').innerText = currentCurrency + finalCash.toFixed(2);

            let timeline = [];

            expenses.forEach(e => {
                const receiptBtn = e.receiptUrl ? `<button class="view-bill-btn" onclick="openReceiptLightbox('${e.receiptUrl}')">📄 View Receipt</button>` : '';
                timeline.push({
                    sortKey: e.id,
                    htmlContent: `<span><span style="color:var(--success); font-size:11px; margin-right:12px;">🗓️ ${e.timeStamp}</span><strong>${e.name}</strong> <small>(${e.category})</small> ${receiptBtn}</span>
                                  <span><span class="statement-badge" style="background:rgba(239,68,68,0.15); color:var(--danger); font-size:10px;">via ${e.paymentMethod || 'GPay'}</span> <strong style="color:var(--danger); margin-left:10px;">-${currentCurrency}${e.amount.toFixed(2)}</strong></span>`
                });
            });

            loggedIncomes.forEach(i => {
                const receiptBtn = i.receiptUrl ? `<button class="view-bill-btn" onclick="openReceiptLightbox('${i.receiptUrl}')">📄 View Doc</button>` : '';
                timeline.push({
                    sortKey: i.id,
                    htmlContent: `<span><span style="color:#06b6d4; font-size:11px; margin-right:12px;">💰 ${i.timeStamp}</span><strong style="color:#34d399;">[Received Influx]</strong> <strong>${i.name}</strong> ${receiptBtn}</span>
                                  <span><span class="statement-badge" style="background:rgba(16,185,129,0.15); color:#34d399; font-size:10px;">to ${i.paymentMethod || 'GPay'}</span> <strong style="color:var(--success); margin-left:10px;">+${currentCurrency}${i.amount.toFixed(2)}</strong></span>`
                });
            });

            subscriptions.forEach(s => {
                const receiptBtn = s.receiptUrl ? `<button class="view-bill-btn" onclick="openReceiptLightbox('${s.receiptUrl}')">📄 View Terms</button>` : '';
                timeline.push({
                    sortKey: s.id,
                    htmlContent: `<span><span style="color:#8b5cf6; font-size:11px; margin-right:12px;">🔄 Recurring</span><strong>Subscription Commitment: ${s.name}</strong> ${receiptBtn}</span>
                                  <span><span class="statement-badge" style="background:rgba(139,92,246,0.15); color:#c084fc; font-size:10px;">via ${s.paymentMethod || 'GPay'}</span> <strong style="color:var(--danger); margin-left:10px;">-${currentCurrency}${s.amount.toFixed(2)}</strong></span>`
                });
            });

            internalTransfers.forEach(t => {
                const transferLabel = t.directionType === "GPayToCash" ? "📱 GPay Bank ➔ 💵 Hand Cash" : "💵 Hand Cash ➔ 📱 GPay Bank";
                timeline.push({
                    sortKey: t.id,
                    htmlContent: `<span><span style="color:#fbbf24; font-size:11px; margin-right:12px;">🔄 ${t.timestamp}</span><strong>Internal Wallet Exchange</strong> <small style="color:var(--text-muted); font-size:12px;">(${transferLabel})</small></span>
                                  <span><span class="statement-badge" style="background:rgba(79,70,229,0.15); color:#a5b4fc; font-size:10px;">Wallet Shift</span> <strong style="color:#a5b4fc; margin-left:10px;">${currentCurrency}${t.amountValue.toFixed(2)}</strong></span>`
                });
            });

            timeline.sort((a, b) => b.sortKey - a.sortKey);
            const listEl = document.getElementById('parent-global-history-list');
            if (timeline.length === 0) {
                listEl.innerHTML = `<p style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px;">No transaction statements logged for this cycle.</p>`;
                return;
            }
            timeline.forEach(item => {
                const li = document.createElement('li');
                li.style.padding = '14px 18px';
                li.innerHTML = item.htmlContent;
                listEl.appendChild(li);
            });
        });
    </script>
</body>
</html>
