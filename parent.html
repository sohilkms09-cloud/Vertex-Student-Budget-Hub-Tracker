<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vertex Budget Hub - Parent Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Custom tweaks just for the parent dashboard view */
        .parent-header {
            text-align: center;
            padding: 20px;
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 14px;
            margin-bottom: 30px;
        }
        .statement-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 10px;
        }
    </style>
</head>
<body class="dark-theme">

    <div class="glass-container" style="max-width: 800px;">
        
        <div class="parent-header">
            <h1 style="background: linear-gradient(to right, #ffffff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px;">👨‍👩‍👦 Vertex Parent Portal</h1>
            <p style="color: var(--text-muted); font-size: 14px; margin: 0;">Official Read-Only Financial Statement Overview for Sohil 🎓</p>
        </div>

        <div class="glass-card" style="border-top: 4px solid #38bdf8;">
            <h2>👛 Active Wallet Account Balances</h2>
            <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 0;">
                <div class="wallet-sub-capsule" style="border-left: 4px solid #38bdf8;">
                    <span class="sub-card-label">📱 GPay Balance</span>
                    <h4 id="parent-gpay-display">₹0.00</h4>
                </div>
                <div class="wallet-sub-capsule" style="border-left: 4px solid #f59e0b;">
                    <span class="sub-card-label">💵 In-Hand Cash</span>
                    <h4 id="parent-cash-display">₹0.00</h4>
                </div>
            </div>
        </div>

        <div class="glass-card" style="border-top: 4px solid var(--accent);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h2 style="margin: 0;">Complete Transaction & Activity History</h2>
                <span style="font-size: 12px; color: var(--text-muted);">Real-Time Sync</span>
            </div>
            
            <ul id="parent-global-history-list" class="ledger-scroller-view" style="max-height: 600px; gap: 10px;">
                </ul>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Read tracking data structures out from shared localStorage matrices
            const gpayInitial = parseFloat(localStorage.getItem('gpayWalletInitial')) || 0;
            const cashInitial = parseFloat(localStorage.getItem('cashWalletInitial')) || 0;
            const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            const subscriptions = JSON.parse(localStorage.getItem('subscriptions')) || [];
            const loggedIncomes = JSON.parse(localStorage.getItem('loggedIncomes')) || [];
            const internalTransfers = JSON.parse(localStorage.getItem('internalTransfers')) || [];
            const currentCurrency = localStorage.getItem('currency') || '₹';

            // Calculate Running Balances
            let gpayExpenses = expenses.filter(e => e.paymentMethod === 'GPay' || !e.paymentMethod).reduce((sum, e) => sum + (parseFloat(e.personalShare) || parseFloat(e.amount) || 0), 0);
            let cashExpenses = expenses.filter(e => e.paymentMethod === 'Cash').reduce((sum, e) => sum + (parseFloat(e.personalShare) || parseFloat(e.amount) || 0), 0);
            
            const totalSubs = subscriptions.reduce((sum, s) => sum + (parseFloat(s.amount) || 0), 0);
            gpayExpenses += totalSubs; // Subscriptions auto-deduct from digital accounts

            const gpayIncome = loggedIncomes.filter(i => i.paymentMethod === 'GPay' || !i.paymentMethod).reduce((sum, i) => sum + i.amount, 0);
            const cashIncome = loggedIncomes.filter(i => i.paymentMethod === 'Cash').reduce((sum, i) => sum + i.amount, 0);

            const transfersToCash = internalTransfers.filter(t => t.directionType === 'GPayToCash').reduce((sum, t) => sum + t.amountValue, 0);
            const transfersToGPay = internalTransfers.filter(t => t.directionType === 'CashToGPay').reduce((sum, t) => sum + t.amountValue, 0);

            const finalGPay = gpayInitial + gpayIncome - gpayExpenses - transfersToCash + transfersToGPay;
            const finalCash = cashInitial + cashIncome - cashExpenses + transfersToCash - transfersToGPay;

            // Update Header Displays
            document.getElementById('parent-gpay-display').innerText = currentCurrency + finalGPay.toFixed(2);
            document.getElementById('parent-cash-display').innerText = currentCurrency + finalCash.toFixed(2);

            // Compile All Activities Into One Chronological Timeline
            let timeline = [];

            expenses.forEach(e => {
                timeline.push({
                    sortKey: e.id,
                    timestamp: e.timeStamp,
                    htmlContent: `<span><span style="color:var(--success); font-size:11px; margin-right:12px;">🗓️ ${e.timeStamp}</span><strong>${e.name}</strong> <small>(${e.category})</small></span>
                                  <span><span class="statement-badge" style="background:rgba(239,68,68,0.15); color:var(--danger); font-size:10px;">Expense via ${e.paymentMethod || 'GPay'}</span> <strong style="color:var(--danger); margin-left:10px;">-${currentCurrency}${e.amount.toFixed(2)}</strong></span>`
                });
            });

            loggedIncomes.forEach(i => {
                timeline.push({
                    sortKey: i.id,
                    timestamp: i.timeStamp,
                    htmlContent: `<span><span style="color:#06b6d4; font-size:11px; margin-right:12px;">💰 ${i.timeStamp}</span><strong style="color:#34d399;">[Received Influx]</strong> <strong>${i.name}</strong></span>
                                  <span><span class="statement-badge" style="background:rgba(16,185,129,0.15); color:#34d399; font-size:10px;">Income to ${i.paymentMethod || 'GPay'}</span> <strong style="color:var(--success); margin-left:10px;">+${currentCurrency}${i.amount.toFixed(2)}</strong></span>`
                });
            });

            internalTransfers.forEach(t => {
                const transferLabel = t.directionType === "GPayToCash" ? "📱 GPay Bank ➔ 💵 Hand Cash" : "💵 Hand Cash ➔ 📱 GPay Bank";
                timeline.push({
                    sortKey: t.id,
                    timestamp: t.timestamp,
                    htmlContent: `<span><span style="color:#fbbf24; font-size:11px; margin-right:12px;">🔄 ${t.timestamp}</span><strong>Internal Wallet Exchange</strong> <small style="color:var(--text-muted); font-size:12px;">(${transferLabel})</small></span>
                                  <span><span class="statement-badge" style="background:rgba(79,70,229,0.15); color:#a5b4fc; font-size:10px;">Wallet Shift</span> <strong style="color:#a5b4fc; margin-left:10px;">${currentCurrency}${t.amountValue.toFixed(2)}</strong></span>`
                });
            });

            // Sort timeline so newest events appear at the very top
            timeline.sort((a, b) => b.sortKey - a.sortKey);

            const listEl = document.getElementById('parent-global-history-list');
            if (timeline.length === 0) {
                listEl.innerHTML = `<p style="color:var(--text-muted); font-size:13px; text-align:center; padding:30px;">No transaction statements logged for this cycle.</p>`;
                return;
            }

            timeline.forEach(item => {
                const li = document.createElement('li');
                li.style.padding = '14px 18px';
                li.innerHTML = item.htmlContent;
                listEl.appendChild(li);
            });
        });
    </script>
</body>
</html>
